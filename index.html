<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrés Felipe Ramos | Soluciones Topográficas Avanzadas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            /* Paleta técnica inspirada en la imagen de campo */
            --primario: #FFCC00; /* Amarillo Oro de Precisión */
            --primario-dim: rgba(255, 204, 0, 0.1);
            --secundario: #0A192F; /* Azul Noche Profundo */
            --acento: #FFD600; /* Amarillo más intenso */
            --fondo: #fcfcfc;
            --texto-principal: #ffffff;
            --texto-cuerpo: #2d3436;
            --blanco: #ffffff;
            --fuente-titulos: 'Oswald', sans-serif;
            --fuente-cuerpo: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--fuente-cuerpo);
            background: var(--fondo);
            color: var(--texto-cuerpo);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Navegación --- */
        nav {
            background: rgba(10, 25, 47, 0.95); /* Semi-transparente */
            padding: 1rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); /* Efecto cristal */
        }

        .logo { 
            font-family: var(--fuente-titulos);
            font-weight: 500; 
            color: var(--blanco); 
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .logo span { color: var(--primario); }

        .menu a {
            color: var(--blanco);
            margin-left: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }

        .menu a::after {
            content: '';
            position: absolute;
            width: 0; height: 2px;
            bottom: -5px; left: 0;
            background-color: var(--primario);
            transition: width 0.3s;
        }

        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: var(--primario); }

        /* --- Hero Section (Texto integrado con imagen) --- */
        .hero {
            height: 100vh;
            /* Usamos tu imagen de fondo guardada, asegúrate de que esté en la misma carpeta */
            background-image: url('ImagenTitulo.png'); 
            background-size: cover;
            background-position: center center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--texto-principal);
            text-align: center;
            padding: 0 10%;
            position: relative;
        }

        /* Máscara de gradiente para difuminar la imagen y mejorar legibilidad */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(10,25,47,0.7) 0%, rgba(10,25,47,0.1) 40%, rgba(10,25,47,0.1) 60%, rgba(10,25,47,0.8) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; /* Sobre la máscara */
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .hero h1 { 
            font-family: var(--fuente-titulos);
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem; 
        }
        .hero p { 
            font-size: 1.3rem; 
            font-weight: 400;
            opacity: 0.9; 
            margin-bottom: 2.5rem; 
            letter-spacing: 1px;
        }

        .btn-main {
            font-family: var(--fuente-titulos);
            background: var(--primario);
            color: var(--secundario);
            border: none;
            padding: 18px 40px;
            font-weight: 500;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(255, 204, 0, 0.5);
        }

        .btn-main:hover {
            transform: translateY(-3px);
            background: var(--acento);
            color: #000;
            box-shadow: 0 6px 25px rgba(255, 214, 0, 0.6);
        }

        /* --- Secciones --- */
        main { padding-bottom: 60px; }
        section { padding: 90px 8%; max-width: 1300px; margin: auto; }

        h2 {
            font-family: var(--fuente-titulos);
            color: var(--secundario);
            font-size: 2.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            display: inline-block;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 70px;
            height: 4px;
            background: var(--primario);
            position: absolute;
            bottom: -10px; left: 0;
        }

        /* --- Perfil Profesional --- */
        #sobre-mi p {
            font-size: 1.1rem;
            color: var(--texto-cuerpo);
            margin-bottom: 1.5rem;
            max-width: 800px;
        }
        #sobre-mi p strong { color: var(--secundario); font-weight: 600; }

        /* --- Galería de Proyectos --- */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .proyecto-card {
            position: relative;
            height: 280px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.4s, box-shadow 0.4s;
            background-color: var(--secundario); /* Fondo para cuando carga la imagen */
        }

        .proyecto-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }

        /* Imagen de fondo de cada proyecto */
        .proyecto-card .bg-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s;
            filter: grayscale(20%) brightness(0.9); /* Unificado y técnico */
        }

        .proyecto-card:hover .bg-image {
            transform: scale(1.1);
            filter: grayscale(0%) brightness(1);
        }

        /* Overlay profesional (solo en hover) */
        .proyecto-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10,25,47,0.95) 0%, rgba(255,204,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--blanco);
            opacity: 0;
            transition: 0.4s;
            padding: 30px;
            text-align: center;
            z-index: 2;
        }

        .proyecto-card:hover .proyecto-overlay { opacity: 1; }

        .proyecto-overlay h3 { 
            font-family: var(--fuente-titulos);
            font-size: 1.6rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--blanco); /* Texto blanco sobre el gradiente */
        }
        .proyecto-overlay p { font-size: 0.95rem; opacity: 0.9; }

        /* --- Contacto --- */
        #contacto { background-color: #f4f7f6; border-radius: 15px; margin-top: 40px; }
        .contacto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .info-item { 
            text-align: center; 
            padding: 40px; 
            background: var(--blanco); 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        .info-item:hover { border-bottom: 3px solid var(--primario); transform: translateY(-3px); }

        .info-item i { font-size: 2.5rem; color: var(--primario); margin-bottom: 20px; }
        .info-item h4 { font-family: var(--fuente-titulos); text-transform: uppercase; color: var(--secundario); margin-bottom: 10px; }
        .info-item p { font-size: 1rem; color: var(--texto-cuerpo); }

        /* --- SECCIÓN DEL CÓDIGO QR --- */
        #qr-section {
            background-color: #fafafa;
            border-radius: 15px;
            padding: 60px 8%;
            max-width: 1000px;
            margin: 60px auto;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .qr-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .qr-content p {
            font-size: 1.1rem;
            color: var(--texto-cuerpo);
            max-width: 600px;
            margin-bottom: 10px;
        }
        .qr-content p strong { color: var(--secundario); font-weight: 600; }

        .qr-wrapper {
            background-color: var(--blanco);
            border: 5px solid var(--blanco); /* Borde blanco alrededor */
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .qr-wrapper:hover {
            transform: scale(1.03); /* Un pequeño zoom técnico */
        }

        .qr-wrapper img {
            width: 250px; /* Tamaño del QR */
            height: auto;
            display: block;
            border: 2px solid var(--primario); /* Borde amarillo alrededor */
            border-radius: 5px;
        }

        /* --- Footer --- */
        footer {
            background: var(--secundario);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 50px 8%;
            font-size: 0.9rem;
        }
        footer span { color: var(--primario); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AFRM <span>Topografía</span></div>
        <div class="menu">
            <a href="#inicio">Inicio</a>
